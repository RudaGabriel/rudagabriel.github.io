<!DOCTYPE html>
<html lang="pt">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Controle de Vencimento</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="icon.png" type="image/png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2042570332495044" crossorigin="anonymous"></script>
	<meta name="google-adsense-account" content="ca-pub-2042570332495044">
</head>

<body>
	<script type="module" src="firebaseSync.js"></script>

	<div id="dadosfirediv" class="overlay-firebase">
		<div class="firebase-card">
			<h2>Configurar sincronização Firebase</h2>
			<div class="firebase-grid">
				<input type="text" id="SUA_CHAVE" placeholder="SUA_CHAVE">
				<input type="text" id="SEU_DOMINIO" placeholder="SEU_DOMINIO.firebaseapp.com">
				<input type="text" id="SEU_PROJETO" placeholder="SEU_PROJETO">
				<input type="text" id="SEU_BUCKET" placeholder="SEU_BUCKET">
				<input type="text" id="SEU_ID" placeholder="SEU_ID">
				<input type="text" id="SUA_APP_ID" placeholder="SUA_APP_ID">
			</div>
			<div class="firebase-actions">
				<button id="ConfirmarDadosFire">Confirmar</button>
				<button id="CancelarDadosFire" class="btn-ghost">Cancelar</button>
			</div>
		</div>
	</div>

	<main class="page-shell">
		<header class="hero">
			<h1>Controle de Vencimento</h1>
			<p>Gerencie validade, alertas e sincronização do seu estoque com clareza.</p>
		</header>

		<div class="content-layout">
			<div class="features-column">
				<section class="panel controls form-panel">
					<div class="controls controls-grid">
						<input type="text" id="produto" placeholder="Produto">
						<input type="number" id="quantidade" placeholder="Quantidade">
						<input type="date" id="vencimento">
						<input type="text" id="codigoBarras" placeholder="Código de Barras">
						<button id="iniciar" class="btn-ghost" title="Ler código de barras">📷 Ler código</button>
						<button id="adicionar">Adicionar</button>
					</div>
				</section>

				<section class="panel controls filter-panel">
					<div class="controls filter-grid">
						<input type="text" id="filtro" placeholder="Filtrar por nome ou código">
						<button id="filtroVencidos" class="btn-ghost">Mostrar produtos vencidos</button>
						<button id="filtroEsteMes" class="btn-ghost">Mostrar produtos que vão vencer este mês</button>
						<button id="exportar">Exportar</button>
						<input type="file" id="importar" style="display:none;">
						<button id="botaoImportar">Importar</button>
						<button id="sincronizar" class="btn-sync">Sincronizar</button>
						<div class="alert-config">
							<label for="nAlertar">Alertar com</label>
							<input type="number" id="nAlertar" placeholder="60">
							<select id="como">
								<option value="dias" selected>Dias</option>
								<option value="meses">Meses</option>
							</select>
							<span>restantes</span>
						</div>
					</div>
				</section>
			</div>

			<section class="panel table-panel">
				<div class="table-container">
					<table>
						<thead>
							<tr>
								<th>Código de Barras</th>
								<th>Produto</th>
								<th>Quantidade</th>
								<th id="vencimentoHeader">Vencimento</th>
								<th>Ações</th>
							</tr>
						</thead>
						<tbody id="lista"></tbody>
					</table>
				</div>
			</section>
		</div>
	</main>

	<div id="containerleitor" class="displaynone">
		<button id="pararleitor">Cancelar leitura</button>
	</div>

	<div id="modal" class="modal">
		<div class="modal-content">
			<p id="modalBody"></p>
			<div class="modal-actions">
				<button id="confirmar">Confirmar</button>
				<button id="cancelar" class="btn-ghost">Cancelar</button>
			</div>
		</div>
	</div>

	<script src="script.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</body>

</html>
